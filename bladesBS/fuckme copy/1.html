<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Xbox Blades</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Segoe UI",Arial,sans-serif;
    background:radial-gradient(ellipse at center, #2b2d33 0%, #101114 100%);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:24px;
  }
  .dash{
    width:99.9%;max-width:100%;height:99.9%;
    border-radius:18px;overflow:hidden;background:#0c0d10;
    box-shadow:0 30px 80px rgba(0,0,0,.6), inset 0 0 0 2px rgba(255,255,255,.05);
    display:flex;flex-direction:column;
  }
  .main{position:relative;flex:1;overflow:hidden;}

  .blade{
    position:absolute;top:14px;bottom:14px;
    border-radius:10px;border:none;cursor:pointer;
    background:linear-gradient(160deg,var(--a),var(--b));
    box-shadow:0 6px 14px rgba(0,0,0,.35), inset 0 0 0 1px rgba(255,255,255,.08);
    color:rgba(255,255,255,.65);
    font-size:12px;letter-spacing:2px;text-transform:lowercase;
    writing-mode:vertical-rl;transform:rotate(180deg);
    display:flex;align-items:center;justify-content:center;
    transition:left .4s cubic-bezier(.5,0,.5,1), width .4s cubic-bezier(.5,0,.5,1), color .2s, box-shadow .2s;
    font-family:inherit;
  }
  .blade:hover{color:rgba(255,255,255,.9);}
  .blade.active{
    color:#fff;font-weight:600;font-size:14px;
    box-shadow:0 8px 20px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.18), 0 0 0 2px rgba(255,255,255,.06);
  }
  .blade:focus-visible{outline:2px solid #fff;outline-offset:2px;}

  .stage{
    position:absolute;top:14px;bottom:14px;border-radius:10px;
    background:#15161a;box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);
    overflow:hidden;
    transition:left .4s cubic-bezier(.5,0,.5,1), width .4s cubic-bezier(.5,0,.5,1);
  }
  .panel-content{height:100%;overflow-y:auto;padding:24px 28px;color:#eef0f2;transition:opacity .18s ease;}
  .panel-content::-webkit-scrollbar{width:8px;}
  .panel-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px;}

  .crumb{font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px;color:var(--ac,#9ad14a);}
  .h1{font-size:24px;font-weight:600;margin-bottom:18px;}

  .news-grid{display:flex;gap:24px;}
  .news-list{flex:1.1;display:flex;flex-direction:column;}
  .news-row{display:flex;align-items:center;gap:14px;padding:12px 10px;border-bottom:1px solid rgba(255,255,255,.08);cursor:pointer;border-radius:6px;transition:background .2s;}
  .news-row:hover{background:rgba(255,255,255,.06);}
  .news-ico{width:40px;height:40px;border-radius:6px;flex:0 0 40px;background:linear-gradient(145deg,#1f78c9,#062a4d);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;}
  .news-txt .t{font-size:14px;font-weight:600;}
  .news-txt .s{font-size:12px;color:rgba(255,255,255,.5);}
  .news-feature{flex:1;border-radius:10px;background:linear-gradient(160deg,#1f78c9,#062a4d);padding:20px;display:flex;flex-direction:column;justify-content:flex-end;min-height:220px;}
  .news-feature .tag{align-self:flex-start;background:rgba(0,0,0,.35);padding:4px 10px;border-radius:20px;font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
  .news-feature h3{font-size:18px;margin-bottom:6px;}
  .news-feature p{font-size:12px;color:rgba(255,255,255,.8);line-height:1.5;}

  .profile-bar{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
  .avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:15px;}
  .gtag{font-size:15px;font-weight:600;}
  .gscore{font-size:12px;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:5px;}
  .gscore .dot{width:8px;height:8px;border-radius:50%;}
  .status{margin-left:auto;display:flex;align-items:center;gap:16px;color:rgba(255,255,255,.6);font-size:12px;}
  .wifi{display:flex;align-items:flex-end;gap:2px;height:12px;}
  .wifi span{width:3px;background:rgba(255,255,255,.6);border-radius:1px;}
  .wifi span:nth-child(1){height:4px;} .wifi span:nth-child(2){height:7px;} .wifi span:nth-child(3){height:10px;} .wifi span:nth-child(4){height:12px;}
  .batt{width:20px;height:10px;border:1px solid rgba(255,255,255,.6);border-radius:2px;position:relative;}
  .batt::after{content:"";position:absolute;top:1px;left:1px;bottom:1px;width:70%;background:rgba(255,255,255,.6);border-radius:1px;}

  .hero{display:flex;gap:16px;margin-bottom:22px;}
  .game-card{
    border-radius:8px;background:linear-gradient(160deg,var(--a),var(--b));
    display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:8px;
    padding:10px;cursor:pointer;transition:transform .15s;position:relative;
  }
  .game-card:hover{transform:translateY(-3px);}
  .game-card .cico{width:26px;height:26px;opacity:.85;}
  .card-title{font-size:12px;font-weight:600;color:#fff;text-align:center;}
  .game-card.featured{width:280px;height:170px;box-shadow:0 0 0 3px var(--a);}
  .game-card.featured .cico{width:40px;height:40px;}
  .game-card.featured .card-title{font-size:15px;}
  .game-card.small{width:96px;height:170px;}
  .lib-title{font-size:13px;color:rgba(255,255,255,.5);letter-spacing:1px;text-transform:uppercase;margin:0 0 12px;}
  .lib-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;}
  .lib-grid .game-card{height:96px;}
  .lib-grid .game-card .cico{width:20px;height:20px;}

  .fb-card{max-width:520px;}
  .fb-stars{display:flex;gap:8px;margin:14px 0 20px;}
  .star{width:34px;height:34px;border-radius:6px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;color:rgba(255,255,255,.4);transition:background .2s,color .2s;border:none;font-family:inherit;}
  .star.on{background:#c17a1a;color:#fff;}
  textarea{width:100%;min-height:110px;resize:vertical;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:12px;color:#fff;font-size:13px;font-family:inherit;margin-bottom:16px;}
  textarea:focus{outline:2px solid #ffbf5c;}
  .btn{background:linear-gradient(150deg,#c17a1a,#3a2409);color:#fff;border:none;padding:10px 22px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.5px;font-family:inherit;}
  .btn:hover{filter:brightness(1.1);}
  .fb-note{font-size:12px;color:rgba(255,255,255,.5);margin-top:10px;}

  .set-row{display:flex;align-items:center;gap:14px;padding:14px 10px;border-bottom:1px solid rgba(255,255,255,.08);cursor:pointer;border-radius:6px;}
  .set-row:hover{background:rgba(255,255,255,.06);}
  .set-ico{width:36px;height:36px;border-radius:6px;flex:0 0 36px;background:linear-gradient(145deg,#6d7178,#1c1d20);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;}
  .set-txt .t{font-size:14px;font-weight:600;}
  .set-txt .s{font-size:11px;color:rgba(255,255,255,.5);}
  .chev{margin-left:auto;color:rgba(255,255,255,.35);font-size:16px;}

  .bottombar{height:44px;flex:0 0 44px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;font-size:12px;color:rgba(255,255,255,.7);background:#0a0b0d;}
  .btnhints{display:flex;gap:18px;}
  .hint{display:flex;align-items:center;gap:6px;}
  .circ{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#1a1a1a;}
  .circ.y{background:#e8c400;} .circ.b{background:#d23b3b;color:#fff;} .circ.a{background:#5aab3d;color:#fff;} .circ.x{background:#2f7fd6;color:#fff;}
</style>
</head>
<body>

<div class="dash" id="dash">
  <div class="main" id="main">
    <button class="blade" data-i="0" style="--a:#1f78c9;--b:#062a4d;">news</button>
    <button class="blade" data-i="1" style="--a:#5c8a1f;--b:#16290a;">games</button>
    <button class="blade" data-i="2" style="--a:#1f9a7a;--b:#07271f;">pc games</button>
    <button class="blade" data-i="3" style="--a:#c17a1a;--b:#3a2409;">feedback</button>
    <button class="blade" data-i="4" style="--a:#6d7178;--b:#1c1d20;">settings</button>
    <div class="stage" id="stage">
      <div class="panel-content" id="panelContent"></div>
    </div>
  </div>
  <div class="bottombar">
    <div class="btnhints">
      <div class="hint"><span class="circ y">Y</span>Search</div>
      <div class="hint"><span class="circ x">X</span>Options</div>
    </div>
    <div class="btnhints">
      <div class="hint"><span class="circ b">B</span>Back</div>
      <div class="hint"><span class="circ a">A</span>Select</div>
    </div>
  </div>
</div>

<script>
  const ACCENTS = [
    {a:'#1f78c9', b:'#062a4d'},
    {a:'#5c8a1f', b:'#16290a'},
    {a:'#1f9a7a', b:'#07271f'},
    {a:'#c17a1a', b:'#3a2409'},
    {a:'#6d7178', b:'#1c1d20'}
  ];

  const GAMES_LIB = ['Ember Keep','Skyline Drift','Frost Trials','Rogue Horizon','Arcadia Blade','Iron Tide','Lumen Break','Ashwood','Vortex Run','Solace','Driftwood','Nightfall Racer'];
  const PC_LIB = ['Vantage Protocol','Cinder Line','Northlight','Glass Horizon','Static Field','Hollow Reach','Signal Lost','Boreal','Nine Rivers','Wanderfall','Undertow','Halfmoon'];

  const ICON = '<svg class="cico" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6"><rect x="2" y="8" width="20" height="10" rx="5"/><line x1="7" y1="11" x2="7" y2="15"/><line x1="5" y1="13" x2="9" y2="13"/><circle cx="16" cy="11.5" r="1.1" fill="white" stroke="none"/><circle cx="18.5" cy="14" r="1.1" fill="white" stroke="none"/></svg>';

  function card(title, sizeClass, ac){
    return '<div class="game-card ' + sizeClass + '" style="--a:' + ac.a + ';--b:' + ac.b + '">' + ICON + '<div class="card-title">' + title + '</div></div>';
  }

  function libraryPanel(kind){
    const lib = kind === 'pc' ? PC_LIB : GAMES_LIB;
    const ac = kind === 'pc' ? ACCENTS[2] : ACCENTS[1];
    let html = '<div class="profile-bar">'
      + '<div class="avatar" style="background:linear-gradient(145deg,' + ac.a + ',' + ac.b + ')">PO</div>'
      + '<div><div class="gtag">Player One</div><div class="gscore"><span class="dot" style="background:' + ac.a + '"></span>12,480 G</div></div>'
      + '<div class="status"><div class="wifi"><span></span><span></span><span></span><span></span></div><div class="batt"></div><div class="clk">09:41</div></div>'
      + '</div>';
    html += '<div class="hero">' + card(lib[0], 'featured', ac) + card(lib[1], 'small', ac) + card(lib[2], 'small', ac) + card(lib[3], 'small', ac) + '</div>';
    html += '<div class="lib-title">' + (kind === 'pc' ? 'PC library' : 'Library') + '</div>';
    html += '<div class="lib-grid">' + lib.map(function(t){ return card(t, 'lib', ac); }).join('') + '</div>';
    return html;
  }

  const PANELS = [
    function(){
      return '<div class="crumb" style="--ac:#5bb6ff">xbox live</div><div class="h1">News</div>'
      + '<div class="news-grid"><div class="news-list">'
      + '<div class="news-row"><div class="news-ico">01</div><div class="news-txt"><div class="t">Summer update rolling out</div><div class="s">New dashboard tiles and faster resume</div></div></div>'
      + '<div class="news-row"><div class="news-ico">02</div><div class="news-txt"><div class="t">Two new maps available</div><div class="s">Download now from featured content</div></div></div>'
      + '<div class="news-row"><div class="news-ico">03</div><div class="news-txt"><div class="t">Weekend gold trial</div><div class="s">Free multiplayer access this weekend</div></div></div>'
      + '<div class="news-row"><div class="news-ico">04</div><div class="news-txt"><div class="t">Community spotlight</div><div class="s">Top clips from this week&#39;s players</div></div></div>'
      + '</div><div class="news-feature"><div class="tag">featured</div><h3>Community highlights</h3><p>Catch up on what everyone&#39;s playing and see the clips of the week.</p></div></div>';
    },
    function(){ return libraryPanel('games'); },
    function(){ return libraryPanel('pc'); },
    function(){
      return '<div class="crumb" style="--ac:#ffbf5c">dashboard</div><div class="h1">Feedback</div>'
      + '<div class="fb-card"><div style="font-size:13px;color:rgba(255,255,255,.7);margin-bottom:6px;">How&#39;s the new dashboard working for you?</div>'
      + '<div class="fb-stars" id="stars">'
      + '<button class="star" data-v="1">&#9733;</button><button class="star" data-v="2">&#9733;</button><button class="star" data-v="3">&#9733;</button><button class="star" data-v="4">&#9733;</button><button class="star" data-v="5">&#9733;</button>'
      + '</div><textarea placeholder="Tell us what you would change..."></textarea>'
      + '<button class="btn" id="fbSubmit">Submit feedback</button>'
      + '<div class="fb-note">Your feedback helps shape future updates.</div></div>';
    },
    function(){
      return '<div class="crumb" style="--ac:#d6d9dd">system</div><div class="h1">Settings</div>'
      + '<div class="set-row"><div class="set-ico">C</div><div class="set-txt"><div class="t">Console settings</div><div class="s">Display, audio, and power options</div></div><div class="chev">&#8250;</div></div>'
      + '<div class="set-row"><div class="set-ico">N</div><div class="set-txt"><div class="t">Network settings</div><div class="s">Wireless, wired, and connection status</div></div><div class="chev">&#8250;</div></div>'
      + '<div class="set-row"><div class="set-ico">F</div><div class="set-txt"><div class="t">Family settings</div><div class="s">Content restrictions and playtime</div></div><div class="chev">&#8250;</div></div>'
      + '<div class="set-row"><div class="set-ico">S</div><div class="set-txt"><div class="t">Storage</div><div class="s">Manage saved games and profiles</div></div><div class="chev">&#8250;</div></div>'
      + '<div class="set-row"><div class="set-ico">I</div><div class="set-txt"><div class="t">System info</div><div class="s">Console details and software version</div></div><div class="chev">&#8250;</div></div>';
    }
  ];

  const LEFT_PAD = 12, RIGHT_PAD = 12, GAP = 6, COLLAPSED = 30, EXPANDED = 66;

  const mainEl = document.getElementById('main');
  const blades = Array.from(document.querySelectorAll('.blade'));
  const stage = document.getElementById('stage');
  const panelContent = document.getElementById('panelContent');

  let active = 1;

  function computeLayout(activeIdx){
    const usable = mainEl.clientWidth - LEFT_PAD - RIGHT_PAD;
    const bladeWidths = [0,1,2,3,4].map(function(i){ return i === activeIdx ? EXPANDED : COLLAPSED; });
    const sumBlades = bladeWidths.reduce(function(a,b){ return a+b; }, 0);
    const contentWidth = usable - sumBlades - GAP * 5;
    const order = [];
    for(let i = 0; i <= activeIdx; i++) order.push({type:'blade', i:i});
    order.push({type:'content'});
    for(let i = activeIdx + 1; i < 5; i++) order.push({type:'blade', i:i});
    let x = LEFT_PAD;
    const layout = {};
    order.forEach(function(item){
      const w = item.type === 'content' ? contentWidth : bladeWidths[item.i];
      if(item.type === 'blade') layout['blade' + item.i] = {x:x, w:w};
      else layout.content = {x:x, w:w};
      x += w + GAP;
    });
    return layout;
  }

  function applyLayout(idx, animate){
    const layout = computeLayout(idx);
    if(!animate){
      blades.forEach(function(b){ b.style.transition = 'none'; });
      stage.style.transition = 'none';
    }
    blades.forEach(function(b){
      const i = Number(b.dataset.i);
      const L = layout['blade' + i];
      b.style.left = L.x + 'px';
      b.style.width = L.w + 'px';
      b.classList.toggle('active', i === idx);
    });
    stage.style.left = layout.content.x + 'px';
    stage.style.width = layout.content.w + 'px';
    if(!animate){
      void mainEl.offsetWidth;
      blades.forEach(function(b){ b.style.transition = ''; });
      stage.style.transition = '';
    }
  }

  function wireInteractive(){
    document.querySelectorAll('.star').forEach(function(star){
      star.addEventListener('click', function(){
        const v = Number(star.dataset.v);
        document.querySelectorAll('.star').forEach(function(s){ s.classList.toggle('on', Number(s.dataset.v) <= v); });
      });
    });
    const submit = document.getElementById('fbSubmit');
    if(submit) submit.addEventListener('click', function(){ submit.textContent = 'Sent'; });
  }

  function renderPanel(i){
    panelContent.innerHTML = PANELS[i]();
    wireInteractive();
  }

  function switchTo(newIndex){
    if(newIndex === active) return;
    active = newIndex;
    applyLayout(active, true);
    panelContent.style.opacity = '0';
    setTimeout(function(){
      renderPanel(active);
      panelContent.style.opacity = '1';
    }, 180);
  }

  blades.forEach(function(b){
    b.addEventListener('click', function(){ switchTo(Number(b.dataset.i)); });
  });

  window.addEventListener('resize', function(){ applyLayout(active, false); });

  renderPanel(active);
  applyLayout(active, false);
</script>

</body>
</html>
