<!-- BLOCK REQUESTS -->
<script>
  const blockedUrls = [
    "https://unitygame.herokuapp.com/bitlife/transfer_config.txt"
  ];

  const originalFetch = window.fetch;
  window.fetch = function(url, options) {
    if (blockedUrls.some(b => url.includes(b))) {
      console.warn("Blocked fetch:", url);
      return Promise.reject("Blocked by custom rule");
    }
    return originalFetch(url, options);
  };

  const originalOpen = XMLHttpRequest.prototype.open;
  XMLHttpRequest.prototype.open = function(method, url) {
    if (blockedUrls.some(b => url.includes(b))) {
      console.warn("Blocked XHR:", url);
      this.abort();
      return;
    }
    return originalOpen.apply(this, arguments);
  };
</script>

<!-- DISABLE UNITY ALERTS -->
<script>
  window.alert = function() {
    console.warn("Alert suppressed:", arguments);
  };
</script>

<script>
  var unityInstance = UnityLoader.instantiate("gameContainer", "Build/BitLife.json", {onProgress: UnityProgress});
</script>
