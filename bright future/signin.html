    <script>
      (function () {
        var form = document.querySelector('[data-test-login-form]');
        var passwordInput = form.querySelector('input[type="password"]');
        var pane = document.querySelector('.logon__pane');
        var loading = document.querySelector('.logon__loading');

        var CORRECT_PASSWORD = 'bazinga';
        var GIST_URL = 'https://gist.githubusercontent.com/Dave-031/2726925e45199d5c8765312327819b78/raw/singlepage.html';

        function showLoading() {
          if (pane) pane.style.display = 'none';
          if (loading) loading.style.display = 'flex';
        }

        function hideLoading() {
          if (pane) pane.style.display = '';
          if (loading) loading.style.display = 'none';
        }

        function shakeWrong() {
          if (!passwordInput) return;
          passwordInput.value = '';
          passwordInput.classList.add('logon__form-input--error');
          passwordInput.focus();
          setTimeout(function () {
            passwordInput.classList.remove('logon__form-input--error');
          }, 400);
        }

        async function loadGistIntoPage() {
          try {
            var fullUrl = GIST_URL + '?t=' + Date.now();
            var response = await fetch(fullUrl);
            if (!response.ok) throw new Error('Failed to fetch Gist content');
            var html = await response.text();
            document.open();
            document.write(html);
            document.close();
          } catch (err) {
            console.error(err);
            hideLoading();
            document.body.innerHTML =
              "IF your seeing this then that means something went wrong. Try refreshing. If that doesn't work just wait for a fix.";
          }
        }

        form.addEventListener('submit', function (e) {
          e.preventDefault();

          if (!passwordInput) return;

          if (passwordInput.value === CORRECT_PASSWORD) {
            showLoading();
            // Small delay so the "Logging on. Please wait..." state is visible
            setTimeout(loadGistIntoPage, 700);
          } else {
            shakeWrong();
          }
        });
      })();
    </script>
